{% extends 'base.html' %}
{% block title %}New Note{% endblock %}

{% block content %}

<script id="data" type="application/json">
{
  "error": "{{ error|default:''|escapejs }}",
  "csrfToken": "{{ csrf_token }}",
  "notesUrl": "{% url 'notes' %}"
}
</script>

<div id="app">

  <header class="gd-nav" :class="{ 'gd-nav--shadow': scrolled }">

    <div class="gd-nav__left">
      <a :href="notesUrl" class="gd-icon-btn" title="Back to notes">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
      </a>

      <div class="gd-doc-icon" aria-hidden="true">
        <svg width="36" height="36" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <path d="M28 4H10C7.8 4 6 5.8 6 8v32c0 2.2 1.8 4 4 4h28c2.2 0 4-1.8 4-4V18L28 4z" fill="#4285f4"/>
          <path d="M28 4v14h14L28 4z" fill="#a8c7fa"/>
          <rect x="13" y="22" width="22" height="2" rx="1" fill="white"/>
          <rect x="13" y="27" width="22" height="2" rx="1" fill="white"/>
          <rect x="13" y="32" width="14" height="2" rx="1" fill="white"/>
        </svg>
      </div>

      <div class="gd-title-area">
        <input
          ref="titleInput"
          v-model="title"
          type="text"
          class="gd-doc-title"
          placeholder="Untitled document"
          maxlength="200"
          @input="scheduleDraft"
          aria-label="Note title"
        />
        <div class="gd-doc-meta">
          <span class="gd-meta-chip">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
            My Drive
          </span>
          <span class="gd-dot">·</span>
          <span class="gd-save-status" :class="{ 'is-visible': saveStatus }">
            <svg v-if="saveStatus === 'saving'" class="spin" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
            <svg v-if="saveStatus === 'saved'" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#34a853" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
            <span :style="{ color: saveStatus === 'saved' ? '#34a853' : '#5f6368' }">
              [[ saveStatus === 'saving' ? 'Saving…' : 'Draft saved' ]]
            </span>
          </span>
        </div>
      </div>
    </div>

    <div class="gd-nav__right">
      <button type="button" class="gd-btn gd-btn--ghost" @click="discardNote">Discard</button>
      <button
        type="button"
        class="gd-btn gd-btn--primary"
        :disabled="isSubmitting"
        @click="submitNote"
      >
        <svg v-if="isSubmitting" class="spin" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
        <svg v-else width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v14a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        [[ isSubmitting ? 'Saving…' : 'Save note' ]]
      </button>
    </div>
  </header>

  <div v-if="error" class="gd-error-wrap">
    <div class="gd-error-bar" role="alert">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><circle cx="12" cy="16" r=".5" fill="currentColor"/></svg>
      [[ error ]]
      <button class="gd-error-close" @click="error = ''" aria-label="Dismiss">✕</button>
    </div>
  </div>

  <main class="gd-page-wrap">
    <div class="gd-page">
      <div
        ref="editorEl"
        class="gd-editor"
        contenteditable="true"
        data-placeholder="Start typing your note…"
        role="textbox"
        aria-label="Note content"
        aria-multiline="true"
        @input="onEditorInput"
        @keydown="onEditorKeydown"
      ></div>
    </div>
  </main>

  <form id="note-form" method="POST" action="" style="display:none">
    {% csrf_token %}
    <input type="hidden" id="f-title"   name="title"   />
    <input type="hidden" id="f-content" name="content" />
  </form>

</div>
{% endblock %}


{% block js %}
<script>
const { createApp, ref, onMounted, onBeforeUnmount } = Vue;

createApp({
  delimiters: ["[[", "]]"],

  setup() {
    const pageData = JSON.parse(document.getElementById("data").textContent);
    const notesUrl = pageData.notesUrl;

    const error        = ref(pageData.error || "");
    const title        = ref("");
    const saveStatus   = ref("");
    const isSubmitting = ref(false);
    const scrolled     = ref(false);
    const wordCount    = ref(0);

    const editorEl   = ref(null);
    const titleInput = ref(null);

    let draftTimer = null;
    function scheduleDraft() {
      saveStatus.value = "";
      clearTimeout(draftTimer);
      draftTimer = setTimeout(() => {
        saveStatus.value = "saving";
        setTimeout(() => { saveStatus.value = "saved"; }, 700);
      }, 1400);
    }

    function onEditorInput() {
      const text = editorEl.value.innerText || "";
      wordCount.value = text.trim() ? text.trim().split(/\s+/).length : 0;
      scheduleDraft();
    }

    function onEditorKeydown(e) {
      if (e.key === "Tab") {
        e.preventDefault();
        document.execCommand("insertHTML", false, "\u00a0\u00a0\u00a0\u00a0");
      }
    }

    function submitNote() {
      if (!title.value.trim()) {
        error.value = "A title is required — please give your note a name.";
        titleInput.value.focus();
        return;
      }
      isSubmitting.value = true;
      document.getElementById("f-title").value   = title.value;
      document.getElementById("f-content").value = editorEl.value.innerHTML;
      document.getElementById("note-form").submit();
    }

    function discardNote() {
      const hasContent = title.value.trim() || editorEl.value?.innerText?.trim();
      if (hasContent && !confirm("Discard this note? Changes will be lost.")) return;
      window.location = pageData.notesUrl;
    }

    const onScroll = () => { scrolled.value = window.scrollY > 4; };

    function onKeydown(e) {
      if ((e.ctrlKey || e.metaKey) && e.key === "s") {
        e.preventDefault();
        submitNote();
      }
    }

    onMounted(() => {
      window.addEventListener("scroll", onScroll, { passive: true });
      window.addEventListener("keydown", onKeydown);
      setTimeout(() => {
        titleInput.value ? titleInput.value.focus() : editorEl.value.focus();
      }, 120);
    });

    onBeforeUnmount(() => {
      window.removeEventListener("scroll", onScroll);
      window.removeEventListener("keydown", onKeydown);
      clearTimeout(draftTimer);
    });

    return {
      error, title, saveStatus, isSubmitting,
      scrolled, wordCount,
      notesUrl,
      editorEl, titleInput,
      onEditorInput, onEditorKeydown,
      scheduleDraft,
      submitNote, discardNote,
    };
  }
}).mount("#app");
</script>
{% endblock %}


{% block extra_css %}
<style>
:root {
  --blue:      #1a73e8;
  --blue-dk:   #1557b0;
  --blue-lt:   #e8f0fe;
  --green:     #34a853;
  --red:       #c5221f;
  --red-lt:    #fce8e6;
  --border:    #dadce0;
  --surface:   #ffffff;
  --bg:        #f0f4f9;
  --text:      #202124;
  --text-2:    #5f6368;
  --text-3:    #9aa0a6;
  --nav-h:     64px;
  --sh1: 0 1px 2px rgba(60,64,67,.3), 0 1px 3px rgba(60,64,67,.15);
  --sh2: 0 1px 3px rgba(60,64,67,.3), 0 4px 8px rgba(60,64,67,.15);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Roboto', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
}

.gd-nav {
  position: sticky; top: 0; z-index: 200;
  height: var(--nav-h);
  background: var(--surface);
  border-bottom: 1px solid transparent;
  display: flex; align-items: center;
  padding: 0 16px 0 8px; gap: 8px;
  transition: border-color .2s, box-shadow .2s;
}
.gd-nav--shadow {
  border-color: var(--border);
  box-shadow: var(--sh1);
}
.gd-nav__left  { flex: 1; min-width: 0; display: flex; align-items: center; gap: 8px; }
.gd-nav__right { flex-shrink: 0; display: flex; align-items: center; gap: 8px; }

.gd-icon-btn {
  width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-2); text-decoration: none; border: none;
  background: transparent; cursor: pointer; transition: background .15s;
}
.gd-icon-btn:hover { background: var(--blue-lt); color: var(--blue); }

.gd-doc-icon { flex-shrink: 0; display: flex; align-items: center; }

.gd-title-area { flex: 1; min-width: 0; }

.gd-doc-title {
  display: block; width: 100%;
  font-size: 18px; font-weight: 400;
  font-family: 'Google Sans', 'Roboto', sans-serif;
  color: var(--text); background: transparent;
  border: none; outline: none;
  padding: 3px 6px; border-radius: 4px;
  transition: background .15s; line-height: 1.3;
}
.gd-doc-title:hover  { background: var(--bg); }
.gd-doc-title:focus  { background: var(--bg); box-shadow: 0 0 0 2px var(--blue); }
.gd-doc-title::placeholder { color: #c4c7cc; }

.gd-doc-meta {
  display: flex; align-items: center; gap: 4px;
  padding: 0 6px; margin-top: 1px;
}
.gd-meta-chip {
  font-size: 11px; color: var(--text-3);
  display: flex; align-items: center; gap: 3px;
}
.gd-dot { font-size: 11px; color: var(--text-3); }

.gd-save-status {
  font-size: 11px; color: var(--text-2);
  display: flex; align-items: center; gap: 3px;
  opacity: 0; transition: opacity .25s;
}
.gd-save-status.is-visible { opacity: 1; }

.gd-btn {
  font-family: 'Google Sans', sans-serif;
  font-size: 14px; font-weight: 500;
  height: 36px; padding: 0 18px; border-radius: 4px;
  border: none; cursor: pointer;
  display: inline-flex; align-items: center; gap: 6px;
  white-space: nowrap; letter-spacing: .01em;
  transition: background .15s, box-shadow .15s, opacity .15s;
}
.gd-btn:disabled { opacity: .6; cursor: not-allowed; }

.gd-btn--ghost {
  background: transparent; color: var(--text-2);
  border: 1px solid var(--border);
}
.gd-btn--ghost:hover:not(:disabled) { background: var(--bg); color: var(--text); }

.gd-btn--primary {
  background: var(--blue); color: #fff;
  box-shadow: var(--sh1);
}
.gd-btn--primary:hover:not(:disabled) { background: var(--blue-dk); box-shadow: var(--sh2); }

.gd-error-wrap { max-width: 816px; margin: 12px auto 0; padding: 0 16px; }
.gd-error-bar {
  display: flex; align-items: center; gap: 8px;
  background: var(--red-lt); border: 1px solid #f28b82;
  border-radius: 6px; color: var(--red);
  font-size: 13px; padding: 10px 14px; min-height: 42px;
  animation: slideDown .2s ease-out;
}
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.gd-error-close {
  margin-left: auto; background: none; border: none;
  cursor: pointer; color: var(--red); font-size: 13px;
  padding: 3px 6px; border-radius: 4px; line-height: 1; opacity: .7;
}
.gd-error-close:hover { opacity: 1; background: rgba(197,34,31,.12); }

.gd-page-wrap {
  display: flex; justify-content: center;
  padding: 32px 16px 100px;
}

.gd-page {
  width: 100%; max-width: 816px; min-height: 1056px;
  background: var(--surface); border-radius: 2px;
  box-shadow: var(--sh2);
  padding: 72px 96px;
  animation: pageIn .25s cubic-bezier(.2,.8,.4,1);
}
@keyframes pageIn {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

.gd-editor {
  min-height: 820px; outline: none;
  font-size: 11pt; line-height: 1.75;
  color: var(--text); caret-color: var(--blue);
  font-family: 'Roboto', Georgia, serif;
}
.gd-editor:empty::before {
  content: attr(data-placeholder);
  color: #bdc1c6; pointer-events: none;
}

.gd-editor p  { margin: 0 0 .5em; }
.gd-editor ul, .gd-editor ol { padding-left: 28px; margin: .35em 0; }
.gd-editor li { margin: .2em 0; }
.gd-editor a  { color: var(--blue); text-decoration: underline; }

@keyframes spin { to { transform: rotate(360deg); } }
.spin { animation: spin .8s linear infinite; }

@media (max-width: 900px) {
  .gd-page { padding: 48px 40px; }
}
@media (max-width: 600px) {
  .gd-nav { padding: 0 8px; }
  .gd-doc-meta { display: none; }
  .gd-page { padding: 28px 18px; min-height: unset; }
  .gd-page-wrap { padding: 14px 6px 80px; }
  .gd-btn--ghost { display: none; }
  .gd-btn { padding: 0 14px; }
}
</style>
{% endblock %}
